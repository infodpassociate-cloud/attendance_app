<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Permissions-Policy" content="camera=*, geolocation=*">
<title>Attendance — D P Associates</title>
<script src="config.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:         #0a0a0f;
    --surface:    #13131a;
    --border:     #1e1e2e;
    --accent-in:  #00e5a0;
    --accent-out: #ff4d6d;
    --accent-blue:#4d9fff;
    --text:       #f0f0f5;
    --muted:      #6b6b85;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STATUS BAR ── */
  #status-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
  }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background 0.3s;
  }
  #status-dot.locating { background: #f0c040; animation: pulse 1s infinite; }
  #status-dot.ready    { background: var(--accent-in); }
  #status-dot.error    { background: var(--accent-out); }
  #location-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; color: var(--muted);
    flex: 1; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
  }
  #location-text.ready { color: #cccce0; }
  #clock {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--accent-blue); flex-shrink: 0;
  }

  /* ── APP ── */
  #app {
    padding-top: 52px;
    display: flex; flex-direction: column;
    align-items: center; min-height: 100vh;
  }

  /* ── GREETING ── */
  #greeting-block {
    width: 100%; max-width: 420px;
    padding: 18px 20px 0; text-align: center;
  }
  #emp-name { font-size: 21px; font-weight: 600; }
  #emp-name span { color: var(--accent-in); }
  #greeting-sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; }

  /* ── CAMERA FRAME ── */
  #camera-wrap {
    width: calc(100% - 40px); max-width: 420px;
    margin: 14px 20px 0;
    position: relative;
    border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
    aspect-ratio: 3/4;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transform: scaleX(-1);
  }

  /* corners */
  .corner {
    position: absolute; width: 22px; height: 22px;
    border-color: var(--accent-blue); border-style: solid;
    opacity: 0.8; z-index: 5;
  }
  .corner.tl { top:12px; left:12px;   border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
  .corner.tr { top:12px; right:12px;  border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
  .corner.bl { bottom:12px; left:12px;  border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
  .corner.br { bottom:12px; right:12px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }

  /* scan line */
  #scan-line {
    position: absolute; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
    animation: scan 3s ease-in-out infinite; z-index:5;
  }
  @keyframes scan {
    0%   { top:12px; opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:1; }
    100% { top:calc(100% - 12px); opacity:0; }
  }

  /* live badge */
  #live-badge {
    position:absolute; top:14px; right:14px;
    background:rgba(255,77,109,0.15);
    border:1px solid var(--accent-out);
    color:var(--accent-out);
    font-family:'IBM Plex Mono',monospace;
    font-size:10px; font-weight:600;
    padding:2px 8px; border-radius:4px; z-index:6;
    display:flex; align-items:center; gap:5px;
  }
  #live-badge::before {
    content:''; width:6px; height:6px; border-radius:50%;
    background:var(--accent-out); animation:pulse 1s infinite;
  }

  /* loading */
  #cam-loading {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:var(--surface); z-index:10; gap:12px;
  }
  .spinner {
    width:36px; height:36px;
    border:2px solid var(--border);
    border-top-color:var(--accent-blue);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  #cam-loading p { font-size:13px; color:var(--muted); }

  /* preview */
  #preview-wrap {
    position:absolute; inset:0; z-index:20; display:none;
  }
  #preview-img { width:100%; height:100%; object-fit:cover; }
  #retake-btn {
    position:absolute; top:12px; left:12px;
    background:rgba(10,10,15,0.85);
    border:1px solid var(--border);
    color:var(--text); font-size:12px;
    padding:6px 14px; border-radius:8px;
    cursor:pointer; z-index:25;
    font-family:'DM Sans',sans-serif;
  }

  /* ── BUTTONS ── */
  #btn-row {
    width:calc(100% - 40px); max-width:420px;
    margin:14px 20px 30px;
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .att-btn {
    height:56px; border-radius:14px;
    border:none; cursor:pointer;
    font-family:'DM Sans',sans-serif;
    font-size:15px; font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:transform 0.15s, box-shadow 0.2s;
  }
  .att-btn:active  { transform:scale(0.96); }
  .att-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; }

  #btn-in {
    background:var(--accent-in); color:#001a0d;
    box-shadow:0 0 24px rgba(0,229,160,0.25);
  }
  #btn-in:hover:not(:disabled) { box-shadow:0 0 36px rgba(0,229,160,0.45); }

  #btn-out {
    background:var(--accent-out); color:#1a0008;
    box-shadow:0 0 24px rgba(255,77,109,0.25);
  }
  #btn-out:hover:not(:disabled) { box-shadow:0 0 36px rgba(255,77,109,0.45); }

  .btn-spinner {
    width:18px; height:18px;
    border:2px solid rgba(0,0,0,0.2);
    border-top-color:rgba(0,0,0,0.7);
    border-radius:50%; animation:spin 0.7s linear infinite;
  }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px; padding:11px 20px;
    font-size:13px; color:var(--text);
    opacity:0; transition:all 0.3s; z-index:200;
    white-space:nowrap; pointer-events:none;
    max-width:90vw; text-align:center;
  }
  #toast.show    { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.success { border-color:var(--accent-in);  color:var(--accent-in); }
  #toast.error   { border-color:var(--accent-out); color:var(--accent-out); }

  /* ── HIDDEN CANVAS ── */
  #overlay-canvas { display:none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes spin  { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- STATUS BAR -->
<div id="status-bar">
  <div id="status-dot" class="locating"></div>
  <div id="location-text">Fetching location…</div>
  <div id="clock">--:--:--</div>
</div>

<div id="app">

  <div id="greeting-block">
    <div id="emp-name">Welcome, <span id="name-display">Loading…</span></div>
    <div id="greeting-sub">Fetching your details…</div>
  </div>

  <div id="camera-wrap">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="scan-line"></div>
    <div id="live-badge">LIVE</div>

    <div id="cam-loading">
      <div class="spinner"></div>
      <p>Starting camera…</p>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>

    <div id="preview-wrap">
      <img id="preview-img" alt="captured">
      <button id="retake-btn" onclick="retakePhoto()">↩ Retake</button>
    </div>
  </div>

  <div id="btn-row">
    <button class="att-btn" id="btn-in"  onclick="submitAttendance('IN')"  disabled>
      <span>▶</span> IN
    </button>
    <button class="att-btn" id="btn-out" onclick="submitAttendance('OUT')" disabled>
      <span>■</span> OUT
    </button>
  </div>

</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
var S = {
  name: 'Employee', email: '',
  lat: null, lng: null,
  address: 'Fetching…',
  locationReady: false, cameraReady: false,
  stream: null, submitting: false,
  capturedBase64: null
};

// ─────────────────────────────────────────
//  CLOCK + DATE
// ─────────────────────────────────────────
function tickClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-IN', { hour12: false });
}
setInterval(tickClock, 1000); tickClock();

document.getElementById('greeting-sub').textContent =
  new Date().toLocaleDateString('en-IN', {
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  });

// ─────────────────────────────────────────
//  LOAD NAME — from Apps Script via URL param OR fetch
// ─────────────────────────────────────────
function loadName() {
  // Try URL param first (e.g. ?name=Rahul)
  var params = new URLSearchParams(window.location.search);
  var n = params.get('name');
  if (n) { setName(n); return; }

  // Try fetching from Apps Script (GET with email)
  var email = params.get('email') || '';
  if (email && typeof APPS_SCRIPT_URL !== 'undefined') {
    fetch(APPS_SCRIPT_URL + '?action=getName&email=' + encodeURIComponent(email))
      .then(function(r){ return r.json(); })
      .then(function(d){ setName(d.name || 'Employee'); })
      .catch(function(){ setName('Employee'); });
  } else {
    setName('Employee');
  }
}

function setName(name) {
  S.name = name;
  document.getElementById('name-display').textContent = name;
}

// ─────────────────────────────────────────
//  LOCATION
// ─────────────────────────────────────────
function initLocation() {
  if (!navigator.geolocation) { locationDone('Geolocation not supported', false); return; }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      S.lat = pos.coords.latitude.toFixed(6);
      S.lng = pos.coords.longitude.toFixed(6);
      S.locationReady = true;
      reverseGeocode(parseFloat(S.lat), parseFloat(S.lng));
      checkReady();
    },
    function() { locationDone('Location denied — please allow', false); },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function reverseGeocode(lat, lng) {
  var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng;
  fetch(url, { headers: { 'Accept-Language': 'en' } })
    .then(function(r){ return r.json(); })
    .then(function(d){
      S.address = d.display_name || (S.lat + ', ' + S.lng);
      locationDone(S.address, true);
    })
    .catch(function(){
      S.address = S.lat + ', ' + S.lng;
      locationDone(S.address, true);
    });
}

function locationDone(addr, success) {
  var dot  = document.getElementById('status-dot');
  var text = document.getElementById('location-text');
  dot.className  = success ? 'ready' : 'error';
  text.className = success ? 'ready' : '';
  text.textContent = (success ? '📍 ' : '⚠ ') + addr;
  if (!S.locationReady) { S.locationReady = true; checkReady(); }
}

// ─────────────────────────────────────────
//  CAMERA
// ─────────────────────────────────────────
async function initCamera() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 960 } },
      audio: false
    });
    S.stream = stream;
    var video = document.getElementById('video');
    video.srcObject = stream;
    video.onloadedmetadata = function() {
      document.getElementById('cam-loading').style.display = 'none';
      S.cameraReady = true;
      checkReady();
    };
  } catch(e) {
    document.getElementById('cam-loading').innerHTML =
      '<p style="color:#ff4d6d;padding:20px;text-align:center;font-size:13px;">📷 Camera access denied.<br><br>Please allow camera in browser settings<br>and reload the page.</p>';
  }
}

// ─────────────────────────────────────────
//  ENABLE BUTTONS
// ─────────────────────────────────────────
function checkReady() {
  if (S.cameraReady && S.locationReady) {
    document.getElementById('btn-in').disabled  = false;
    document.getElementById('btn-out').disabled = false;
  }
}

// ─────────────────────────────────────────
//  CAPTURE + TEXT OVERLAY
// ─────────────────────────────────────────
function captureWithOverlay() {
  return new Promise(function(resolve) {
    var video  = document.getElementById('video');
    var canvas = document.getElementById('overlay-canvas');
    var W = video.videoWidth  || 720;
    var H = video.videoHeight || 960;
    canvas.width = W; canvas.height = H;
    var ctx = canvas.getContext('2d');

    // mirror + draw
    ctx.save();
    ctx.translate(W, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, W, H);
    ctx.restore();

    // dark gradient at bottom
    var grad = ctx.createLinearGradient(0, H * 0.52, 0, H);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.88)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    var now = new Date();
    var ts  = now.toLocaleString('en-IN', {
      day:'2-digit', month:'short', year:'numeric',
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true
    });

    var pad = 18;
    var y   = H * 0.58;

    function line(text, size, color, bold) {
      ctx.font = (bold ? '600 ' : '400 ') + size + 'px DM Sans, sans-serif';
      ctx.fillStyle = color;
      ctx.shadowColor = 'rgba(0,0,0,0.95)';
      ctx.shadowBlur  = 8;
      ctx.fillText(text, pad, y);
      y += size * 1.55;
    }

    // address (wrap if long)
    var addrShort = S.address.length > 60 ? S.address.substring(0, 58) + '…' : S.address;
    line('📍 ' + addrShort,         H * 0.021, '#ffffff',   false);
    y += 4;
    line(S.name,                     H * 0.030, '#00e5a0',   true);
    line('🕐 ' + ts,                 H * 0.020, '#dde0ff',   false);
    line('🌐 ' + S.lat + ', ' + S.lng, H * 0.018, '#8888aa', false);

    // watermark top-right
    ctx.shadowBlur  = 0;
    ctx.font        = '600 ' + (H * 0.018) + 'px IBM Plex Mono, monospace';
    ctx.fillStyle   = 'rgba(255,255,255,0.45)';
    ctx.textAlign   = 'right';
    ctx.fillText('D P ASSOCIATES', W - pad, pad + H * 0.022);
    ctx.textAlign   = 'left';

    var base64 = canvas.toDataURL('image/jpeg', 0.88);
    S.capturedBase64 = base64;

    // show preview
    document.getElementById('preview-img').src = base64;
    document.getElementById('preview-wrap').style.display = 'block';

    resolve(base64);
  });
}

function retakePhoto() {
  S.capturedBase64 = null;
  document.getElementById('preview-wrap').style.display = 'none';
}

// ─────────────────────────────────────────
//  UPLOAD PHOTO → Apps Script
// ─────────────────────────────────────────
function uploadPhoto(base64) {
  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'uploadPhoto', name: S.name, image: base64 })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){ return d.url || ''; })
  .catch(function(){ return ''; });
}

// ─────────────────────────────────────────
//  SUBMIT ATTENDANCE → Apps Script
// ─────────────────────────────────────────
async function submitAttendance(type) {
  if (S.submitting) return;
  S.submitting = true;

  var btnIn  = document.getElementById('btn-in');
  var btnOut = document.getElementById('btn-out');
  var btn    = type === 'IN' ? btnIn : btnOut;

  btn.innerHTML = '<div class="btn-spinner"></div>';
  btnIn.disabled = btnOut.disabled = true;

  try {
    // 1. Capture photo with overlay
    var base64 = await captureWithOverlay();

    // 2. Upload photo
    var imageUrl = await uploadPhoto(base64);

    // 3. Build payload
    var now  = new Date();
    var data = {
      action   : 'submit',
      name     : S.name,
      date     : now.toLocaleDateString('en-IN'),
      type     : type,
      address  : S.address,
      lat      : S.lat,
      lng      : S.lng,
      imageUrl : imageUrl,
      phone    : ''
    };

    // 4. Submit to Apps Script
    var res = await fetch(APPS_SCRIPT_URL, {
      method : 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body   : JSON.stringify(data)
    });
    var json = await res.json();

    if (json.status === 'success') {
      showToast('✓ ' + type + ' marked — ' +
        now.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true }),
        'success');
    } else {
      throw new Error(json.message || 'Server error');
    }

    setTimeout(function() {
      S.submitting = false;
      restoreButtons();
    }, 5000);

  } catch(err) {
    showToast('❌ Failed: ' + (err.message || err), 'error');
    S.submitting = false;
    restoreButtons();
  }
}

function restoreButtons() {
  document.getElementById('btn-in').innerHTML  = '<span>▶</span> IN';
  document.getElementById('btn-out').innerHTML = '<span>■</span> OUT';
  document.getElementById('btn-in').disabled   = false;
  document.getElementById('btn-out').disabled  = false;
}

// ─────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────
var toastTimer;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.className = ''; }, 3800);
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
window.onload = function() {
  loadName();
  initLocation();
  initCamera();
};
</script>
</body>
</html>
